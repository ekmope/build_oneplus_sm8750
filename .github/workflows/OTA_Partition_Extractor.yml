name: OTA镜像分区提取

on:
  workflow_dispatch:
    inputs:
      device:
        description: '设备型号'
        required: true
        type: choice
        options:
          - OP 10 PRO
          - OP 11
          - OP 11R
          - OP 12
          - OP 12R
          - OP 13
          - OP 13R
          - OP 13S
          - OP 13T
          - OP 15
          - OP 15R
          - OP 15T
          - OP ACE 3
          - OP ACE 3 PRO
          - OP ACE 3V
          - OP ACE 5
          - OP ACE 5 PRO
          - OP ACE 5 ULTRA
          - OP ACE 5 RACING
          - OP ACE 6
          - OP ACE 6T
          - OP TURBO 6
          - OP TURBO 6V
          - OP NORD 4
          - OP NORD CE4
          - OP NORD 5
          - OP NORD CE5
          - OP PAD
          - OP PAD LITE
          - OP PAD2
          - OP PAD2 PRO
          - OP PAD3
          - OP PAD GO 2
          - OP OPEN
          - OPPO FIND N5
          - OPPO FIND X8
          - OPPO FIND X8 PRO
          - OPPO FIND X8 ULTRA
          - OPPO FIND X9
          - OPPO FIND X9 PRO
          - OPPO RENO 15 PRO
          - Realme GT5 PRO
          - Realme GT7 PRO
          - Realme GT8 PRO
        default: 'OP 13'
      region:
        description: '地区版本'
        required: true
        type: choice
        options:
          - GLO
          - EU
          - IN
          - CN
          - NA
        default: 'CN'
      version_index:
        description: '版本号索引 (0=最新, 1=次新, 以此类推)'
        required: true
        type: number
        default: 0
      partitions:
        description: '要提取的分区 (逗号分隔，如 boot,dtbo,vendor_boot，留空提取全部)'
        required: false
        type: string
        default: 'boot,init_boot,vendor_boot,vbmeta'
      extract_kernel_info:
        description: '是否提取内核构建时间和名称'
        required: false
        type: boolean
        default: true
      workers:
        description: '并行工作线程数'
        required: false
        type: number
        default: 4

jobs:
  extract:
    name: Extract Partitions
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout (检出代码)
        uses: actions/checkout@v4
      
      - name: 🔧 Set up Python (设置Python环境)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: 📦 Install dependencies (安装依赖)
        run: pip install httpx beautifulsoup4
      
      - name: 🔗 Get OTA Download URL (获取OTA下载链接)
        id: get_ota
        run: |
          python3 << 'PYEOF'
          import httpx
          import json
          import os
          import re
          from bs4 import BeautifulSoup
          
          device = "${{ inputs.device }}"
          region = "${{ inputs.region }}"
          version_index = ${{ inputs.version_index }}
          
          url = "https://roms.danielspringer.at/index.php?view=ota"
          resp = httpx.get(url, follow_redirects=True)
          resp.raise_for_status()
          
          soup = BeautifulSoup(resp.text, 'html.parser')
          select = soup.find('select', id='device')
          devices = json.loads(select['data-devices'])
          
          if device not in devices:
              raise Exception(f"Device '{device}' not found")
          
          device_regions = devices[device]
          if region not in device_regions:
              raise Exception(f"Region '{region}' not available for '{device}'")
          
          versions = device_regions[region]
          if not versions:
              raise Exception(f"No versions for '{device}' in '{region}'")
          
          if version_index >= len(versions):
              raise Exception(f"Version index {version_index} out of range (0-{len(versions)-1})")
          
          version = versions[version_index]
          print(f"Selected: {device} | {region} | {version}")
          
          post_data = {
              "device": device,
              "region": region,
              "version_index": str(version_index)
          }
          
          post_resp = httpx.post(url, data=post_data, follow_redirects=True)
          post_resp.raise_for_status()
          
          post_soup = BeautifulSoup(post_resp.text, 'html.parser')
          
          download_url = None
          for a in post_soup.find_all('a', href=True):
              href = a['href']
              if any(kw in href.lower() for kw in ['download', 'ota', 'firmware', 'update', '.zip']):
                  if href.startswith('http'):
                      download_url = href
                      break
          
          if not download_url:
              for a in post_soup.find_all('a', href=True):
                  href = a['href']
                  if href.startswith('http'):
                      download_url = href
                      break
          
          if not download_url:
              with open('response_debug.html', 'w') as f:
                  f.write(post_resp.text)
              raise Exception("Could not find download URL. Check response_debug.html")
          
          print(f"Download URL: {download_url}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'ota_url={download_url}\n')
              f.write(f'version={version}\n')
          PYEOF
      
      - name: 📋 Show OTA Info (显示OTA信息)
        run: |
          echo "### 📱 设备信息" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **设备**: ${{ inputs.device }}" >> $GITHUB_STEP_SUMMARY
          echo "- **地区**: ${{ inputs.region }}" >> $GITHUB_STEP_SUMMARY
          echo "- **版本**: ${{ steps.get_ota.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **OTA URL**: \`${{ steps.get_ota.outputs.ota_url }}\`" >> $GITHUB_STEP_SUMMARY
      
      - name: 🛠️ Install payload-dumper (安装解包工具)
        run: pip install git+https://github.com/5ec1cff/payload-dumper
      
      - name: 📂 Extract partitions (提取分区镜像)
        run: |
          OTA_URL="${{ steps.get_ota.outputs.ota_url }}"
          if [ -z "$OTA_URL" ]; then
            echo "::error::OTA URL is empty, cannot proceed"
            exit 1
          fi

          PARTITIONS_ARG=""
          if [ -n "${{ inputs.partitions }}" ]; then
            PARTITIONS_ARG="--partitions ${{ inputs.partitions }}"
          fi

          payload_dumper \
            $PARTITIONS_ARG \
            --workers ${{ inputs.workers }} \
            --out ./output \
            "$OTA_URL"

      - name: 🔍 Extract Kernel Info (提取内核信息)
        id: kernel_info
        if: inputs.extract_kernel_info == true
        run: |
          BOOT_IMG="output/boot.img"

          if [ ! -f "$BOOT_IMG" ]; then
            echo "::warning::boot.img not found, skipping kernel info extraction"
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "found=true" >> $GITHUB_OUTPUT

          python3 << 'PYEOF'
          import subprocess
          import re
          import os
          import struct
          
          boot_img_path = "./output/boot.img"
          kernel_version = None
          kernel_time = None
          full_string = None
          
          def search_version(text):
              global kernel_version, kernel_time, full_string
              
              match = re.search(
                  r'Linux version (\S+)\s+\([^)]+\)\s+\([^)]+\)\s+#1\s+SMP\s+PREEMPT\s+(.+)',
                  text
              )
              if match:
                  kernel_version = match.group(1)
                  kernel_time = match.group(2).strip()
                  full_string = f"Linux version {kernel_version} ... #1 SMP PREEMPT {kernel_time}"
                  return True
              
              ver_match = re.search(r'Linux\s+version\s+(\d+\.\d+\.\d+-[^\s]+)', text)
              if not ver_match:
                  ver_match = re.search(r'(\d+\.\d+\.\d+-android\d+-[^\s]+)', text)
              
              if ver_match:
                  kernel_version = ver_match.group(1)
                  time_match = re.search(
                      r'#1\s+SMP\s+PREEMPT\s+((?:Mon|Tue|Wed|Thu|Fri|Sat|Sun)\s+\w+\s+\d+\s+[\d:]+\s+\w+\s+\d{4})',
                      text
                  )
                  if time_match:
                      kernel_time = time_match.group(1)
                  full_string = f"Linux version {kernel_version} ... #1 SMP PREEMPT {kernel_time or 'Unknown'}"
                  return True
              return False
          
          result = subprocess.run(['strings', boot_img_path], capture_output=True, text=True)
          if search_version(result.stdout):
              print("Found via direct strings scan")
          else:
              with open(boot_img_path, 'rb') as f:
                  boot_data = f.read()
              
              kernel_offset = 0
              kernel_size = len(boot_data)
              
              if boot_data[:8] == b'ANDROID!':
                  hdr_ver = struct.unpack('<I', boot_data[16:20])[0]
                  kernel_size = struct.unpack('<I', boot_data[8:12])[0]
                  if hdr_ver <= 2:
                      page_size = struct.unpack('<I', boot_data[36:40])[0]
                      kernel_offset = page_size
                  elif hdr_ver >= 3:
                      kernel_offset = 1580
                  print(f"boot.img v{hdr_ver}, offset={kernel_offset}, size={kernel_size}")
              
              kernel_data = boot_data[kernel_offset:kernel_offset + kernel_size]
              
              decompressed = None
              
              try:
                  import gzip, io
                  gz_start = kernel_data.find(b'\x1f\x8b')
                  if gz_start >= 0:
                      with gzip.GzipFile(fileobj=io.BytesIO(kernel_data[gz_start:])) as gz:
                          decompressed = gz.read()
                      print("Decompressed with gzip")
              except Exception as e:
                  print(f"gzip failed: {e}")
              
              if decompressed is None:
                  try:
                      lz4_start = kernel_data.find(b'\x04\x22\x4d\x18')
                      if lz4_start >= 0:
                          with open('/tmp/kernel.lz4', 'wb') as f:
                              f.write(kernel_data[lz4_start:])
                          result = subprocess.run(
                              ['lz4', '-d', '-f', '/tmp/kernel.lz4', '/tmp/vmlinux'],
                              capture_output=True
                          )
                          if result.returncode == 0:
                              with open('/tmp/vmlinux', 'rb') as f:
                                  decompressed = f.read()
                              print("Decompressed with lz4")
                  except Exception as e:
                      print(f"lz4 failed: {e}")
              

              if decompressed is None:
                  try:
                      zstd_start = kernel_data.find(b'\x28\xb5\x2f\xfd')
                      if zstd_start >= 0:
                          with open('/tmp/kernel.zst', 'wb') as f:
                              f.write(kernel_data[zstd_start:])
                          result = subprocess.run(
                              ['zstd', '-d', '-f', '/tmp/kernel.zst', '-o', '/tmp/vmlinux'],
                              capture_output=True
                          )
                          if result.returncode == 0:
                              with open('/tmp/vmlinux', 'rb') as f:
                                  decompressed = f.read()
                              print("Decompressed with zstd")
                  except Exception as e:
                      print(f"zstd failed: {e}")
              
              if decompressed:
                  text = decompressed.decode('utf-8', errors='ignore')
                  if search_version(text):
                      print("Found in decompressed kernel")
              else:
                  print("All decompression methods failed")
          
          if kernel_version:
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('found=true\n')
                  f.write(f'kernel_version={kernel_version}\n')
                  f.write(f'kernel_time={kernel_time or "Unknown"}\n')
                  f.write(f'full_string={full_string or kernel_version}\n')
              print(f"\n✅ Kernel Version: {kernel_version}")
              print(f"✅ Build Time: {kernel_time or 'Unknown'}")
          else:
              print("\n❌ Could not extract kernel info")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('found=false\n')
          PYEOF
      
      - name: 📊 Show Kernel Info (显示内核信息)
        if: inputs.extract_kernel_info == true && steps.kernel_info.outputs.found == 'true'
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔧 内核信息" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| **Kernel Version** | \`${{ steps.kernel_info.outputs.kernel_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Time** | \`${{ steps.kernel_info.outputs.kernel_time }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Full String** | \`${{ steps.kernel_info.outputs.full_string }}\` |" >> $GITHUB_STEP_SUMMARY
      
      - name: 📝 Check output (检查结果)
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 提取结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 文件名 | 大小 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          
          for f in output/*.img; do
            if [ -f "$f" ]; then
              SIZE=$(du -h "$f" | cut -f1)
              NAME=$(basename "$f")
              echo "| $NAME | $SIZE |" >> $GITHUB_STEP_SUMMARY
            fi
          done
      
      - name: 📤 Upload results (上传提取结果)
        uses: actions/upload-artifact@v4
        with:
          name: extracted-${{ inputs.device }}-${{ inputs.region }}-${{ steps.get_ota.outputs.version }}
          path: output/*.img
          retention-days: 7
          if-no-files-found: error